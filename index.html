<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фото</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial,sans-serif;
cursor:pointer;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#222,#000);
transition:1s;
}

#start{
position:absolute;
padding:18px 50px;
font-size:28px;
color:#fff;
background:#ff2b2b;
border:none;
border-radius:50px;
box-shadow:0 0 30px red;
animation:pulse 1.2s infinite;
z-index:5;
cursor:pointer;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

#image{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1.5s;
}

.show{
opacity:1 !important;
}
</style>
</head>

<body>

<div id="bg"></div>

<button id="start">▶ Нажми</button>

<img id="image" src="image.jpg">

<audio id="audio" loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("start");
const img = document.getElementById("image");
const audio = document.getElementById("audio");

btn.onclick = async () => {

    // Скрыть кнопку
    btn.style.display = "none";

    // Полноэкранный режим
    if (document.documentElement.requestFullscreen) {
        try {
            await document.documentElement.requestFullscreen();
        } catch(e) {}
    }

    // Показать картинку
    img.classList.add("show");

    // Запустить звук
    audio.loop = true;
    audio.volume = 1;
    audio.play();

    // Вибрация
    if (navigator.vibrate) {
        navigator.vibrate([300,100,300,100,300]);
    }

};

</script>

</body>
</html>
